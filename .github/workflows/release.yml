name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-13
            platform: macos
            arch: x64
          # - os: ubuntu-latest
          #   platform: linux
          #   arch: x64
          # - os: windows-latest
          #   platform: win
          #   arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:prod

      - name: Find build output
        id: artifact
        run: |
          BUILD_DIR=$(ls -d build/stable-* | head -1)
          echo "dir=$BUILD_DIR" >> $GITHUB_OUTPUT
          echo "Build directory: $BUILD_DIR"

      - name: Create archive
        run: |
          cd "${{ steps.artifact.outputs.dir }}"
          tar czf "$GITHUB_WORKSPACE/krow-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "krow-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" \
            --clobber
